<svg viewBox="0 0 1120 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ared" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <marker id="agrn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/>
    </marker>
  </defs>
  <rect width="1120" height="720" fill="#ffffff"/>

  <text x="560" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f3d5c">Project 7: GitOps delivery with ArgoCD</text>
  <text x="560" y="54" text-anchor="middle" font-size="11" fill="#64748b">the pipeline stops deploying · the cluster pulls its own desired state from git</text>

  <!-- OLD WAY (push) -->
  <rect x="30" y="80" width="480" height="120" rx="10" fill="#fdf2f2" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="50" y="102" font-size="12" font-weight="bold" fill="#b91c1c">BEFORE (Projects 4 to 6): push model</text>
  <rect x="60" y="118" width="110" height="44" rx="6" fill="#ffffff" stroke="#15577d" stroke-width="2"/>
  <text x="115" y="145" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#15577d">Jenkins</text>
  <rect x="330" y="118" width="150" height="44" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="405" y="145" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2453b3">EKS cluster</text>
  <line x1="170" y1="140" x2="328" y2="140" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#ared)"/>
  <text x="249" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">kubectl apply (push)</text>
  <text x="249" y="181" text-anchor="middle" font-size="9.5" fill="#b91c1c">Jenkins holds cluster credentials · drift goes unnoticed</text>

  <!-- NEW WAY label -->
  <rect x="540" y="80" width="550" height="120" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="560" y="102" font-size="12" font-weight="bold" fill="#15803d">NOW (Project 7): pull model</text>
  <text x="560" y="126" font-size="10.5" fill="#334155">1. Jenkins builds and pushes the image, then commits a new</text>
  <text x="560" y="143" font-size="10.5" fill="#334155">    image tag to the GitOps repo. It never touches the cluster.</text>
  <text x="560" y="164" font-size="10.5" fill="#334155">2. ArgoCD, inside the cluster, sees the commit and syncs.</text>
  <text x="560" y="185" font-size="10.5" font-weight="bold" fill="#15803d">Deploy = commit.  Rollback = git revert.</text>

  <!-- MAIN FLOW -->
  <!-- app repo + jenkins -->
  <rect x="30" y="240" width="240" height="300" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="150" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">BUILD</text>

  <rect x="55" y="278" width="190" height="46" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="150" y="299" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">App repo</text>
  <text x="150" y="315" text-anchor="middle" font-size="9" fill="#475569">source code + Jenkinsfile</text>

  <rect x="55" y="352" width="190" height="56" rx="8" fill="#ffffff" stroke="#15577d" stroke-width="2"/>
  <text x="150" y="374" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15577d">Jenkins</text>
  <text x="150" y="391" text-anchor="middle" font-size="9" fill="#475569">build · test · scan · push</text>
  <line x1="150" y1="324" x2="150" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="55" y="440" width="190" height="46" rx="8" fill="#fff1e6" stroke="#ec7211" stroke-width="2"/>
  <text x="150" y="461" text-anchor="middle" font-size="12" font-weight="bold" fill="#b4530f">Amazon ECR</text>
  <text x="150" y="477" text-anchor="middle" font-size="9" fill="#475569">image :build-42</text>
  <line x1="150" y1="408" x2="150" y2="438" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="157" y="428" font-size="9" fill="#475569">push image</text>

  <!-- gitops repo -->
  <rect x="330" y="330" width="230" height="110" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="445" y="356" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#3730a3">GitOps repo</text>
  <text x="445" y="376" text-anchor="middle" font-size="10" fill="#475569">Kubernetes manifests</text>
  <text x="445" y="393" text-anchor="middle" font-size="10" fill="#475569">the desired state</text>
  <text x="445" y="415" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#3730a3">SINGLE SOURCE OF TRUTH</text>

  <line x1="245" y1="374" x2="328" y2="374" stroke="#15803d" stroke-width="2.5" marker-end="url(#agrn)"/>
  <text x="286" y="366" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d">commit</text>
  <text x="286" y="390" text-anchor="middle" font-size="8.5" fill="#15803d">new image tag</text>

  <!-- cluster -->
  <rect x="620" y="240" width="470" height="380" rx="10" fill="#eef3fd" stroke="#326ce5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="855" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#2453b3">EKS CLUSTER</text>

  <!-- argocd -->
  <rect x="645" y="286" width="420" height="120" rx="8" fill="#ffffff" stroke="#ef7b4d" stroke-width="2.5"/>
  <text x="855" y="310" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#c2410c">ArgoCD</text>
  <text x="855" y="330" text-anchor="middle" font-size="10.5" fill="#475569">the reconciliation loop, running forever</text>
  <rect x="665" y="344" width="110" height="46" rx="6" fill="#fff7ed" stroke="#ef7b4d"/>
  <text x="720" y="364" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#c2410c">1. observe</text>
  <text x="720" y="380" text-anchor="middle" font-size="8.5" fill="#475569">git vs cluster</text>
  <rect x="800" y="344" width="110" height="46" rx="6" fill="#fff7ed" stroke="#ef7b4d"/>
  <text x="855" y="364" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#c2410c">2. compare</text>
  <text x="855" y="380" text-anchor="middle" font-size="8.5" fill="#475569">Synced?</text>
  <rect x="935" y="344" width="110" height="46" rx="6" fill="#fff7ed" stroke="#ef7b4d"/>
  <text x="990" y="364" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#c2410c">3. sync</text>
  <text x="990" y="380" text-anchor="middle" font-size="8.5" fill="#475569">make it match</text>

  <!-- pull arrow -->
  <path d="M 560 372 C 600 372, 605 340, 643 340" fill="none" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="600" y="326" text-anchor="middle" font-size="10" font-weight="bold" fill="#4f46e5">PULL</text>

  <!-- workloads -->
  <rect x="645" y="440" width="420" height="90" rx="8" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="855" y="463" text-anchor="middle" font-size="12" font-weight="bold" fill="#2453b3">ShopFlow workloads</text>
  <text x="855" y="482" text-anchor="middle" font-size="9.5" fill="#475569">storefront · orders · catalog · notifications</text>
  <text x="855" y="501" text-anchor="middle" font-size="9.5" fill="#475569">deployments · services · ingress</text>
  <text x="855" y="519" text-anchor="middle" font-size="9" fill="#475569">(monitoring stack also managed by ArgoCD)</text>

  <line x1="855" y1="406" x2="855" y2="438" stroke="#c2410c" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="863" y="427" font-size="9.5" font-weight="bold" fill="#c2410c">apply</text>

  <!-- self heal loop -->
  <path d="M 1055 480 C 1090 480, 1090 360, 1063 360" fill="none" stroke="#15803d" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#agrn)"/>
  <text x="1085" y="424" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d" transform="rotate(90 1085 424)">self-heal: drift reverted</text>

  <!-- image pull -->
  <path d="M 150 486 C 150 580, 700 580, 760 532" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="430" y="574" text-anchor="middle" font-size="9.5" fill="#475569">cluster pulls the image from ECR</text>

  <!-- key callout -->
  <rect x="30" y="600" width="530" height="90" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="48" y="623" font-size="11.5" font-weight="bold" fill="#334155">The one thing to notice</text>
  <text x="48" y="644" font-size="10.5" fill="#475569">There is no arrow from Jenkins to the cluster. That is the entire point.</text>
  <text x="48" y="662" font-size="10.5" fill="#475569">Jenkins commits to git. The cluster pulls from git and makes itself match.</text>
  <text x="48" y="680" font-size="10.5" font-weight="bold" fill="#15803d">Deploy = commit.   Rollback = git revert.   Drift = corrected automatically.</text>
</svg>
